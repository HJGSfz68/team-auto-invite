<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>操飞奥特曼</title>
    <meta name="description" content="输入邮箱，获取 ChatGPT Team 席位邀请">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f5f0;
            color: #1a1a1a;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ========== 背景装饰 ========== */
        body::before {
            content: '';
            position: fixed;
            top: -30%;
            right: -20%;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(180, 160, 130, 0.12) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -20%;
            left: -15%;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(140, 120, 100, 0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* ========== 主卡片 ========== */
        .card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            padding: 48px 40px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow:
                0 4px 24px rgba(0, 0, 0, 0.04),
                0 12px 48px rgba(0, 0, 0, 0.06);
            margin: 20px;
            animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.98);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ========== Logo ========== */
        .logo-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
        }

        .logo {
            width: 56px;
            height: 56px;
            background: #1a1a1a;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .logo:hover {
            transform: scale(1.08) rotate(-3deg);
        }

        .logo svg {
            width: 28px;
            height: 28px;
        }

        /* ========== 标题区 ========== */
        .header {
            text-align: center;
            margin-bottom: 36px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .header p {
            font-size: 14px;
            color: #8a8072;
            font-weight: 400;
            line-height: 1.5;
        }

        /* ========== 表单 ========== */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #3d3529;
            margin-bottom: 8px;
            letter-spacing: 0.01em;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap input {
            width: 100%;
            padding: 14px 16px;
            font-size: 15px;
            font-family: inherit;
            color: #1a1a1a;
            background: rgba(255, 255, 255, 0.8);
            border: 1.5px solid #e0dbd3;
            border-radius: 12px;
            outline: none;
            transition: all 0.25s ease;
        }

        .input-wrap input::placeholder {
            color: #bbb5aa;
        }

        .input-wrap input:focus {
            border-color: #8a7b6b;
            box-shadow: 0 0 0 3px rgba(138, 123, 107, 0.12);
            background: #fff;
        }

        .input-wrap input:hover:not(:focus) {
            border-color: #c5bdb2;
        }

        /* ========== 按钮 ========== */
        .btn-submit {
            width: 100%;
            padding: 14px 24px;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            color: #fff;
            background: linear-gradient(135deg, #3d3529 0%, #2a2118 100%);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
            letter-spacing: 0.02em;
        }

        .btn-submit::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .btn-submit:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(61, 53, 41, 0.3);
        }

        .btn-submit:hover:not(:disabled)::before {
            left: 100%;
        }

        .btn-submit:active:not(:disabled) {
            transform: translateY(0);
            box-shadow: 0 2px 8px rgba(61, 53, 41, 0.2);
        }

        .btn-submit:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        /* ========== 加载动画 ========== */
        .btn-submit .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto;
        }

        .btn-submit.loading .btn-text {
            display: none;
        }

        .btn-submit.loading .spinner {
            display: block;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ========== 提示消息 ========== */
        .message {
            margin-top: 20px;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            line-height: 1.5;
            display: none;
            animation: msgIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes msgIn {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.success {
            display: block;
            background: rgba(34, 139, 34, 0.08);
            color: #1a7a1a;
            border: 1px solid rgba(34, 139, 34, 0.15);
        }

        .message.error {
            display: block;
            background: rgba(180, 60, 40, 0.08);
            color: #a03020;
            border: 1px solid rgba(180, 60, 40, 0.15);
        }

        /* ========== 底部提示 ========== */
        .footer-note {
            text-align: center;
            margin-top: 28px;
            font-size: 12px;
            color: #b0a898;
            line-height: 1.6;
        }

        /* ========== 响应式 ========== */
        @media (max-width: 480px) {
            .card {
                padding: 36px 24px;
                border-radius: 20px;
            }

            .header h1 {
                font-size: 20px;
            }
        }
    </style>
</head>

<body>
    <div class="card">
        <!-- Logo -->
        <div class="logo-wrap">
            <div class="logo">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M22.282 9.821a5.985 5.985 0 0 0-.516-4.91 6.046 6.046 0 0 0-6.51-2.9A6.065 6.065 0 0 0 4.981 4.18a5.985 5.985 0 0 0-3.998 2.9 6.046 6.046 0 0 0 .743 7.097 5.98 5.98 0 0 0 .51 4.911 6.051 6.051 0 0 0 6.515 2.9A5.985 5.985 0 0 0 13.26 24a6.056 6.056 0 0 0 5.772-4.206 5.99 5.99 0 0 0 3.997-2.9 6.056 6.056 0 0 0-.747-7.073zM13.26 22.43a4.476 4.476 0 0 1-2.876-1.04l.141-.081 4.779-2.758a.795.795 0 0 0 .392-.681v-6.737l2.02 1.168a.071.071 0 0 1 .038.052v5.583a4.504 4.504 0 0 1-4.494 4.494zM3.6 18.304a4.47 4.47 0 0 1-.535-3.014l.142.085 4.783 2.759a.771.771 0 0 0 .78 0l5.843-3.369v2.332a.08.08 0 0 1-.033.062L9.74 19.95a4.5 4.5 0 0 1-6.14-1.646zM2.34 7.896a4.485 4.485 0 0 1 2.366-1.973V11.6a.766.766 0 0 0 .388.676l5.815 3.355-2.02 1.168a.076.076 0 0 1-.071.005l-4.83-2.786A4.504 4.504 0 0 1 2.34 7.872zm16.597 3.855L13.1 8.364l2.02-1.166a.076.076 0 0 1 .071-.006l4.83 2.786a4.494 4.494 0 0 1-.676 8.105v-5.678a.79.79 0 0 0-.407-.654zm2.01-3.028l-.141-.085-4.774-2.782a.776.776 0 0 0-.785 0L9.409 9.23V6.897a.066.066 0 0 1 .028-.061l4.83-2.787a4.5 4.5 0 0 1 6.68 4.66zm-12.64 4.135l-2.02-1.164a.08.08 0 0 1-.038-.057V6.085a4.499 4.499 0 0 1 7.37-3.456l-.14.08-4.78 2.758a.795.795 0 0 0-.392.681zm1.097-2.365l2.602-1.5 2.607 1.5v3.005l-2.602 1.5-2.607-1.5z"
                        fill="white" />
                </svg>
            </div>
        </div>

        <!-- 标题 -->
        <div class="header">
            <h1>ChatGPT Team</h1>
            <p>输入邮箱，获取 Team 席位邀请</p>
        </div>

        <!-- 表单 -->
        <form id="inviteForm" onsubmit="return handleSubmit(event)">
            <div class="form-group">
                <label for="emailInput">邮箱地址</label>
                <div class="input-wrap">
                    <input type="email" id="emailInput" name="email" placeholder="your@email.com" required
                        autocomplete="email" autofocus>
                </div>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">
                <span class="btn-text">发送邀请</span>
                <div class="spinner"></div>
            </button>
        </form>

        <!-- 消息提示 -->
        <div id="message" class="message"></div>

        <!-- 底部提示 -->
        <p class="footer-note">
            注意查收邮箱，报错就是死号了
        </p>
    </div>

    <script>
        /**
         * 处理表单提交
         */
        async function handleSubmit(e) {
            e.preventDefault();

            const emailInput = document.getElementById('emailInput');
            const submitBtn = document.getElementById('submitBtn');
            const messageEl = document.getElementById('message');
            const email = emailInput.value.trim();

            if (!email) return false;

            // 进入加载状态
            submitBtn.classList.add('loading');
            submitBtn.disabled = true;
            messageEl.className = 'message';
            messageEl.style.display = 'none';

            try {
                const resp = await fetch('/api/invite', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email }),
                });

                const data = await resp.json();

                // 显示结果
                messageEl.textContent = data.message;
                messageEl.className = 'message ' + (data.success ? 'success' : 'error');
                messageEl.style.display = 'block';

                // 成功后清空输入框
                if (data.success) {
                    emailInput.value = '';
                }
            } catch (err) {
                messageEl.textContent = '网络请求失败，请稍后重试';
                messageEl.className = 'message error';
                messageEl.style.display = 'block';
            } finally {
                // 恢复按钮
                submitBtn.classList.remove('loading');
                submitBtn.disabled = false;
            }

            return false;
        }

        // 回车提交
        document.getElementById('emailInput').addEventListener('keydown', function (e) {
            if (e.key === 'Enter') {
                document.getElementById('inviteForm').requestSubmit();
            }
        });
    </script>
</body>

</html>
