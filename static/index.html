<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>操飞奥特曼</title>
    <meta name="description" content="输入邮箱，获取 ChatGPT Team 席位邀请">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f5f0;
            color: #1a1a1a;
            -webkit-font-smoothing: antialiased;
        }

        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        body::before {
            top: -30%;
            right: -20%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(180, 160, 130, .12) 0%, transparent 70%);
        }

        body::after {
            bottom: -20%;
            left: -15%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(140, 120, 100, .08) 0%, transparent 70%);
        }

        .card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            padding: 48px 40px;
            margin: 20px;
            background: rgba(255, 255, 255, .85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, .6);
            box-shadow: 0 4px 24px rgba(0, 0, 0, .04), 0 12px 48px rgba(0, 0, 0, .06);
            animation: cardIn .6s cubic-bezier(.16, 1, .3, 1) both;
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(20px) scale(.98);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .logo-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
        }

        .logo {
            width: 56px;
            height: 56px;
            background: #1a1a1a;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 12px rgba(0, 0, 0, .15);
            transition: transform .3s cubic-bezier(.34, 1.56, .64, 1);
        }

        .logo:hover {
            transform: scale(1.08) rotate(-3deg);
        }

        .logo svg {
            width: 28px;
            height: 28px;
        }

        .header {
            text-align: center;
            margin-bottom: 36px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -.02em;
        }

        .header p {
            font-size: 14px;
            color: #8a8072;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #3d3529;
            margin-bottom: 8px;
        }

        .input-wrap input {
            width: 100%;
            padding: 14px 16px;
            font-size: 15px;
            font-family: inherit;
            color: #1a1a1a;
            background: rgba(255, 255, 255, .8);
            border: 1.5px solid #e0dbd3;
            border-radius: 12px;
            outline: none;
            transition: all .25s ease;
        }

        .input-wrap input::placeholder {
            color: #bbb5aa;
        }

        .input-wrap input:focus {
            border-color: #8a7b6b;
            box-shadow: 0 0 0 3px rgba(138, 123, 107, .12);
            background: #fff;
        }

        .input-wrap input:hover:not(:focus) {
            border-color: #c5bdb2;
        }

        .btn-submit {
            width: 100%;
            padding: 14px 24px;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            color: #fff;
            background: linear-gradient(135deg, #3d3529, #2a2118);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            letter-spacing: .02em;
            transition: all .3s cubic-bezier(.34, 1.56, .64, 1);
        }

        .btn-submit::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, .1), transparent);
            transition: left .5s ease;
        }

        .btn-submit:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(61, 53, 41, .3);
        }

        .btn-submit:hover:not(:disabled)::before {
            left: 100%;
        }

        .btn-submit:active:not(:disabled) {
            transform: translateY(0);
            box-shadow: 0 2px 8px rgba(61, 53, 41, .2);
        }

        .btn-submit:disabled {
            opacity: .7;
            cursor: not-allowed;
        }

        .btn-submit .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, .3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .7s linear infinite;
            margin: 0 auto;
        }

        .btn-submit.loading .btn-text {
            display: none;
        }

        .btn-submit.loading .spinner {
            display: block;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .message {
            margin-top: 20px;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            line-height: 1.5;
            display: none;
            animation: msgIn .35s cubic-bezier(.16, 1, .3, 1) both;
        }

        @keyframes msgIn {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.success {
            display: block;
            background: rgba(34, 139, 34, .08);
            color: #1a7a1a;
            border: 1px solid rgba(34, 139, 34, .15);
        }

        .message.error {
            display: block;
            background: rgba(180, 60, 40, .08);
            color: #a03020;
            border: 1px solid rgba(180, 60, 40, .15);
        }

        .footer-note {
            text-align: center;
            margin-top: 28px;
            font-size: 12px;
            color: #b0a898;
            line-height: 1.6;
        }

        .gh-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 16px;
            padding: 10px 20px;
            border-radius: 10px;
            background: #1a1a1a;
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: all .25s ease;
        }

        .gh-link:hover {
            background: #333;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 0, 0, .2);
        }

        @media (max-width: 480px) {
            .card {
                padding: 36px 24px;
                border-radius: 20px;
            }

            .header h1 {
                font-size: 20px;
            }
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="logo-wrap">
            <div class="logo">
                <svg viewBox="0 0 24 24" fill="none">
                    <path
                        d="M22.282 9.821a5.985 5.985 0 0 0-.516-4.91 6.046 6.046 0 0 0-6.51-2.9A6.065 6.065 0 0 0 4.981 4.18a5.985 5.985 0 0 0-3.998 2.9 6.046 6.046 0 0 0 .743 7.097 5.98 5.98 0 0 0 .51 4.911 6.051 6.051 0 0 0 6.515 2.9A5.985 5.985 0 0 0 13.26 24a6.056 6.056 0 0 0 5.772-4.206 5.99 5.99 0 0 0 3.997-2.9 6.056 6.056 0 0 0-.747-7.073zM13.26 22.43a4.476 4.476 0 0 1-2.876-1.04l.141-.081 4.779-2.758a.795.795 0 0 0 .392-.681v-6.737l2.02 1.168a.071.071 0 0 1 .038.052v5.583a4.504 4.504 0 0 1-4.494 4.494zM3.6 18.304a4.47 4.47 0 0 1-.535-3.014l.142.085 4.783 2.759a.771.771 0 0 0 .78 0l5.843-3.369v2.332a.08.08 0 0 1-.033.062L9.74 19.95a4.5 4.5 0 0 1-6.14-1.646zM2.34 7.896a4.485 4.485 0 0 1 2.366-1.973V11.6a.766.766 0 0 0 .388.676l5.815 3.355-2.02 1.168a.076.076 0 0 1-.071.005l-4.83-2.786A4.504 4.504 0 0 1 2.34 7.872zm16.597 3.855L13.1 8.364l2.02-1.166a.076.076 0 0 1 .071-.006l4.83 2.786a4.494 4.494 0 0 1-.676 8.105v-5.678a.79.79 0 0 0-.407-.654zm2.01-3.028l-.141-.085-4.774-2.782a.776.776 0 0 0-.785 0L9.409 9.23V6.897a.066.066 0 0 1 .028-.061l4.83-2.787a4.5 4.5 0 0 1 6.68 4.66zm-12.64 4.135l-2.02-1.164a.08.08 0 0 1-.038-.057V6.085a4.499 4.499 0 0 1 7.37-3.456l-.14.08-4.78 2.758a.795.795 0 0 0-.392.681zm1.097-2.365l2.602-1.5 2.607 1.5v3.005l-2.602 1.5-2.607-1.5z"
                        fill="white" />
                </svg>
            </div>
        </div>
        <div class="header">
            <h1>ChatGPT Team</h1>
            <p>输入邮箱和兑换码，兑换 Team 席位邀请</p>
        </div>
        <form id="inviteForm">
            <div class="form-group">
                <label for="emailInput">邮箱地址</label>
                <div class="input-wrap">
                    <input type="email" id="emailInput" name="email" placeholder="your@email.com" required
                        autocomplete="email" autofocus>
                </div>
            </div>
            <div class="form-group">
                <label for="codeInput">兑换码</label>
                <div class="input-wrap">
                    <input type="text" id="codeInput" name="code" placeholder="TEAM-XXXXXXXXXX" required
                        autocomplete="one-time-code">
                </div>
            </div>
            <button type="submit" class="btn-submit" id="submitBtn">
                <span class="btn-text">立即兑换</span>
                <div class="spinner"></div>
            </button>
        </form>
        <div id="message" class="message"></div>
        <p class="footer-note">兑换成功后将自动发送邀请，请注意查收邮箱。</p>
        <a class="gh-link" href="https://github.com/Futureppo/team-auto-invite" target="_blank">
            <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor">
                <path
                    d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z" />
            </svg>
            GitHub
        </a>
    </div>
    <script>
        const $ = id => document.getElementById(id);
        const emailInput = $('emailInput'), codeInput = $('codeInput'), submitBtn = $('submitBtn'), messageEl = $('message');

        $('inviteForm').addEventListener('submit', async e => {
            e.preventDefault();
            const email = emailInput.value.trim();
            const code = codeInput.value.trim();
            if (!email || !code) return;

            submitBtn.classList.add('loading');
            submitBtn.disabled = true;
            messageEl.className = 'message';

            try {
                const resp = await fetch('/api/redeem', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, code }),
                });
                const data = await resp.json();
                messageEl.textContent = data.message;
                messageEl.className = 'message ' + (data.success ? 'success' : 'error');
                if (data.success) {
                    emailInput.value = '';
                    codeInput.value = '';
                }
            } catch {
                messageEl.textContent = '网络请求失败，请稍后重试';
                messageEl.className = 'message error';
            } finally {
                submitBtn.classList.remove('loading');
                submitBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
